name: Android release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional generated-release tag. Blank uses ci-android-<run>-<attempt>."
        required: false
        type: string
      release_name:
        description: "Optional generated-release title."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.0"
  FLUTTER_REVISION: "559ffa3f75e7402d65a8def9c28389a9b2e6fe42"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  ANDROID_NDK_VERSION: "28.2.13676358"
  ANDROID_CMAKE_VERSION: "3.22.1"

jobs:
  build:
    name: Build signed APKs
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          actual_revision="$(git -C "$RUNNER_TEMP/flutter" rev-parse HEAD)"
          test "$actual_revision" = "$FLUTTER_REVISION"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "$sdk_root" ]]; then
            echo "ANDROID_HOME/ANDROID_SDK_ROOT is not set" >&2
            exit 1
          fi

          sdkmanager_bin="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$sdkmanager_bin" ]]; then
            sdkmanager_bin="$(find "$sdk_root/cmdline-tools" -path "*/bin/sdkmanager" -type f | sort -r | head -n 1 || true)"
          fi
          if [[ -z "$sdkmanager_bin" || ! -x "$sdkmanager_bin" ]]; then
            echo "sdkmanager not found under $sdk_root/cmdline-tools" >&2
            exit 1
          fi

          echo "$(dirname "$sdkmanager_bin")" >> "$GITHUB_PATH"

          set +o pipefail
          yes | "$sdkmanager_bin" --licenses >/dev/null
          sdkmanager_license_status="${PIPESTATUS[1]}"
          set -o pipefail
          if [[ "$sdkmanager_license_status" -ne 0 ]]; then
            exit "$sdkmanager_license_status"
          fi

          "$sdkmanager_bin" \
            "platforms;android-$ANDROID_API_LEVEL" \
            "build-tools;$ANDROID_BUILD_TOOLS_VERSION" \
            "ndk;$ANDROID_NDK_VERSION" \
            "cmake;$ANDROID_CMAKE_VERSION"

      - name: Show build environment
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          java -version
          sdkmanager --version

      - name: Configure release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$ANDROID_STORE_PASSWORD"

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          EOF

      - name: Resolve Flutter dependencies
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter precache --android
          flutter build apk --config-only

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          flutter test
          (cd android && ./gradlew testReleaseUnitTest --no-daemon)

      - name: Build release APKs
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          rm -rf build/app/outputs/flutter-apk
          flutter build apk \
            --release \
            --split-per-abi \
            --target-platform android-arm64,android-x64
          sha256sum build/app/outputs/flutter-apk/*.apk > build/app/outputs/flutter-apk/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/flutter-apk/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create non-latest CI GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          tag_name="$RELEASE_TAG_INPUT"
          if [[ -z "$tag_name" ]]; then
            tag_name="ci-android-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          fi

          release_title="$RELEASE_NAME_INPUT"
          if [[ -z "$release_title" ]]; then
            release_title="CI Android build ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          fi

          release_notes="$(printf 'Automated Android APK build from GitHub Actions.\n\nSource ref: %s\nCommit: %s\nWorkflow run: %s/%s/actions/runs/%s\n\nThis release is marked as a prerelease and is not marked as Latest.\n' \
            "$GITHUB_REF_NAME" \
            "$GITHUB_SHA" \
            "$GITHUB_SERVER_URL" \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_RUN_ID"
          )"

          gh release view "$tag_name" >/dev/null 2>&1 || \
            gh release create "$tag_name" \
              --target "$GITHUB_SHA" \
              --title "$release_title" \
              --notes "$release_notes" \
              --prerelease \
              --latest=false

          gh release upload "$tag_name" \
            build/app/outputs/flutter-apk/*.apk \
            build/app/outputs/flutter-apk/SHA256SUMS.txt \
            --clobber
