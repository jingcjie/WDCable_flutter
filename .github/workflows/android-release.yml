name: Android release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.0"
  FLUTTER_REVISION: "559ffa3f75e7402d65a8def9c28389a9b2e6fe42"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  ANDROID_NDK_VERSION: "28.2.13676358"
  ANDROID_CMAKE_VERSION: "3.22.1"

jobs:
  build:
    name: Build signed APKs
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          actual_revision="$(git -C "$RUNNER_TEMP/flutter" rev-parse HEAD)"
          test "$actual_revision" = "$FLUTTER_REVISION"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail

          sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "$sdk_root" ]]; then
            echo "ANDROID_HOME/ANDROID_SDK_ROOT is not set" >&2
            exit 1
          fi

          sdkmanager_bin="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$sdkmanager_bin" ]]; then
            sdkmanager_bin="$(find "$sdk_root/cmdline-tools" -path "*/bin/sdkmanager" -type f | sort -r | head -n 1 || true)"
          fi
          if [[ -z "$sdkmanager_bin" || ! -x "$sdkmanager_bin" ]]; then
            echo "sdkmanager not found under $sdk_root/cmdline-tools" >&2
            exit 1
          fi

          echo "$(dirname "$sdkmanager_bin")" >> "$GITHUB_PATH"
          yes | "$sdkmanager_bin" --licenses >/dev/null
          "$sdkmanager_bin" \
            "platforms;android-$ANDROID_API_LEVEL" \
            "build-tools;$ANDROID_BUILD_TOOLS_VERSION" \
            "ndk;$ANDROID_NDK_VERSION" \
            "cmake;$ANDROID_CMAKE_VERSION"

      - name: Show build environment
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          java -version
          sdkmanager --version

      - name: Configure release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$ANDROID_STORE_PASSWORD"

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          EOF

      - name: Resolve Flutter dependencies
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter precache --android
          flutter build apk --config-only

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          flutter test
          (cd android && ./gradlew testReleaseUnitTest --no-daemon)

      - name: Build release APKs
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          flutter build apk --release --split-per-abi
          sha256sum build/app/outputs/flutter-apk/*.apk > build/app/outputs/flutter-apk/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/flutter-apk/SHA256SUMS.txt
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag_name="${GITHUB_REF_NAME}"
          gh release view "$tag_name" >/dev/null 2>&1 || \
            gh release create "$tag_name" --title "$tag_name" --notes "Automated Android release build for $tag_name."
          gh release upload "$tag_name" \
            build/app/outputs/flutter-apk/*.apk \
            build/app/outputs/flutter-apk/SHA256SUMS.txt \
            --clobber
